name: Update AI CLI Documentation

on:
  schedule:
    # Every Sunday at 8pm EST (01:00 UTC Monday)
    - cron: "0 1 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run document-aiclis update
        env:
          OPENAI_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          codex exec "Read the skill at .claude/skills/document-aiclis/SKILL.md and follow its update procedure to update README.md with the latest versions and slash commands for all 4 AI CLIs. Check the npm registry for version updates and the official vendor documentation for slash command changes. Only update what has actually changed." --full-auto

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update AI CLI versions and slash commands

          Automated weekly update via document-aiclis skill.

          Co-Authored-By: Codex CLI <noreply@openai.com>"
          git push
